# ThermalAI - Configuration
# Device: POCO F6 (peridot) — Snapdragon 8s Gen 3 (pineapple) / HyperOS
# Edit values here; changes take effect after: thermalair restart

# ─── Temperature Thresholds (°C) ──────────────────────────────────────────────
# Composite weighted temp across cpuss, gpuss, xo-therm, cpu_therm zones
TEMP_COOL=42        # Below: performance available (Lowered to act on heat sooner)
TEMP_WARM=48        # 42-48: balanced (Sweet spot for normal usage)
TEMP_HOT=58         # 48-58: conservative (Throttle background, keep game smooth)
TEMP_POWERSAVE=68   # 58-68: powersave (Start capping game perf to save battery/heat)
TEMP_CRITICAL=75    # Above 68: emergency cool (Aggressive shutdown prevention)

# ─── AI Tuning ────────────────────────────────────────────────────────────────
POLL_INTERVAL=2          # seconds between reads (non-gaming)
GAME_POLL_INTERVAL=1     # seconds between reads (gaming)
TEMP_HISTORY_SIZE=10     # samples in rolling window (10×2s = 20s of history)
PREDICTION_WINDOW=5      # samples ahead to predict (= 10s into future)
POLICY_DEBOUNCE_SEC=10   # min seconds between policy changes

# ─── Gaming ───────────────────────────────────────────────────────────────────
# GAMING_SCORE_BOOST and GPU_GAMING_THRESHOLD are set below in v3.0 section.

# ─── Logging ──────────────────────────────────────────────────────────────────
# DEBUG = verbose (every sensor read logged), INFO = normal, WARN = minimal
THERMALAI_LOG_LEVEL=INFO

# ─── ROM Notes (AOSP / GlaciumKernel) ────────────────────────────────────────
# Stock swappiness on this ROM = 40 (not 100 like HyperOS).
# ThermalAI restores to 40 in powersave/emergency modes.
# ZRAM: 6GB pool, lz4 algorithm (faster decompression than HyperOS's lzo-rle).
# GlaciumKernel unlocked lower CPU floors: LITTLE=364800 BIG/PRIME=480000 kHz.

# ─── Game Detection (v2.0) ────────────────────────────────────────────────────
# GPU threshold lowered to 20% (CODM runs at 13-40%, was wrongly set to 60%)
GPU_GAMING_THRESHOLD=20

# Seconds between dumpsys calls for package detection (don't lower below 3)
PKG_CACHE_TTL=5

# ─── Log Rotation ─────────────────────────────────────────────────────────────
# Clear log every N minutes (keeps last 200 lines as context). Default: 60
LOG_ROTATE_MIN=60

# ─── v3.0 Detection Engine (oom_score_adj based) ──────────────────────────────
# How often the /proc scan runs (seconds). Don't lower below 2.
PROC_SCAN_INTERVAL=3

# Latch duration increased to 45s (CODM loading screens can be 30-40s)
GAME_LATCH_SEC=45

# Gaming score boost raised to 35 (ensures performance at 36°C when gaming)
GAMING_SCORE_BOOST=35
